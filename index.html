<!DOCTYPE html>
<html lang="en"> 
<head>
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>StudyZone Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;800&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet"> 
  <style>
    *{box-sizing:border-box;margin:0;padding:0;} 
    html,body,#root{height:100%;overflow:hidden;background:#05050a;color:#e2e8f10;font-family:'Nunito',sans-serif;} 
    ::-webkit-scrollbar{width:6px;} 
    ::-webkit-scrollbar-thumb{background:rgba(0,220,255,0.2);border-radius:10px;} 
    .glass{background:rgba(255,255,255,0.03);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.08);}
    button { transition: all 0.2s ease; }
    button:hover { transform: translateY(-2px); }
    .smooth-transition { transition: all 0.3s ease-in-out; }
  </style> 
</head> 
<body> 
<div id="root"></div> 
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// Generate unique room codes
function generateRoomCode() {
  return Math.floor(Math.random() * 900000 + 100000).toString();
}

// Nova AI Agent - Enhanced Response System
const novaResponses = { /* ... (same as before) */ };

function getNovaResponse(userInput) { /* ... (same as before) */ }

// Join Screen Component (unchanged)
function JoinScreen({ onJoin }) { /* ... (same as before) */ }

// Main App Component
function App() {
  const [session, setSession] = useState(null);
  const [view, setView] = useState("chat");

  return (
    <div style={{ display: "flex", height: "100vh" }}>
      {!session ? (
        <JoinScreen onJoin={(userSession) => setSession(userSession)} />
      ) : (
        <>
          {/* Sidebar */}
          <div className="glass" style={{ 
            width: 240, 
            display: "flex", 
            flexDirection: "column", 
            borderRight: "1px solid rgba(255,255,255,0.1)" 
          }}>
            {/* ... (same sidebar code) */}
          </div>

          {/* Main Content */}
          <div style={{ flex: 1, position: "relative", background: "#05050a" }}>
            {view === "chat" && <ChatView user={session} roomId={session.roomId} />}
            {view === "ai" && <AIView user={session} />}
            {view === "games" && <GameView />}
            {view === "video" && <VideoCallView user={session} />}
          </div>
        </>
      )}
    </div>
  );
}

// Chat View Component - Fixed (No Simulated Responses)
function ChatView({ user, roomId }) {
  const [messages, setMessages] = useState([
    { id: Date.now(), text: `Welcome to StudyZone Pro, ${user.name}!`, user: "System", timestamp: new Date().toLocaleTimeString() }
  ]);
  const [input, setInput] = useState("");
  const messagesEndRef = useRef(null);

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages]);

  const handleSend = () => {
    if (!input.trim()) return;
    const userMessage = {
      id: Date.now(),
      text: input,
      user: user.name,
      timestamp: new Date().toLocaleTimeString()
    };
    setMessages(prev => [...prev, userMessage]);
    setInput("");
  };

  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column" }}>
      {/* Header */}
      <div className="glass" style={{ padding: "15px 25px", borderBottom: "1px solid rgba(255,255,255,0.1)" }}>
        <h2 style={{ color: "#00dcff", fontSize: 20, fontWeight: 800, display: "flex", alignItems: "center", gap: 10 }}>
          <span>💬</span> Study Chat - {roomId}
        </h2>
      </div>
      
      {/* Messages Area */}
      <div style={{ flex: 1, overflowY: "auto", padding: 20 }}>
        {messages.map(message => (
          <div key={message.id} style={{ marginBottom: 15, display: "flex", flexDirection: message.user === "System" ? "column" : "row" }}>
            {/* Message UI (same as before) */}
          </div>
        ))}
        <div ref={messagesEndRef} />
      </div>
      
      {/* Input Area */}
      <div className="glass" style={{ padding: "15px 25px", borderTop: "1px solid rgba(255,255,255,0.1)", display: "flex" }}>
        <input /* ... (same input props) */ />
        <button onClick={handleSend} style={{ /* ... */ }}>SEND</button>
      </div>
    </div>
  );
}

// AI View Component - Nova AI Agent (Fixed)
function AIView({ user }) {
  const [messages, setMessages] = useState([
    { id: Date.now(), role: 'assistant', text: `Hello ${user.name}! I'm Nova, your personal study assistant.` }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const messagesEndRef = useRef(null);

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages]);

  const sendMessage = () => {
    if (!input.trim()) return;
    const userMsg = { id: Date.now(), role: 'user', text: input };
    setMessages(prev => [...prev, userMsg]);
    setInput('');
    setLoading(true);
    
    setTimeout(() => {
      const aiResponse = getNovaResponse(input);
      const assistantMsg = { id: Date.now() + 1, role: 'assistant', text: aiResponse };
      setMessages(prev => [...prev, assistantMsg]);
      setLoading(false);
    }, 800);
  };

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
      {/* Header & Messages Area (same as before) */}
      {/* Input Area (same as before) */}
    </div>
  );
}

// Video Call Component - NEW
function VideoCallView({ user }) {
  const localVideoRef = useRef(null);
  const [error, setError] = useState(null);

  useEffect(() => {
    navigator.mediaDevices.getUserMedia({ video: true, audio: true })
      .then(stream => {
        localVideoRef.current.srcObject = stream;
      })
      .catch(err => {
        setError("Camera access denied. Please enable permissions.");
      });
  }, []);

  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column" }}>
      <div className="glass" style={{ padding: "15px 25px", borderBottom: "1px solid rgba(255,255,255,0.1)" }}>
        <h2 style={{ color: "#00dcff", fontSize: 20 }}>🎥 Video Call</h2>
        {error && <p style={{ color: "#ef4444" }}>{error}</p>}
      </div>
      
      <div style={{ flex: 1, display: "flex", justifyContent: "center", alignItems: "center", padding: 20 }}>
        <video ref={localVideoRef} autoPlay muted style={{ width: 320, height: 240, borderRadius: 8, border: "2px solid #00dcff" }} />
      </div>
      
      <div className="glass" style={{ padding: "15px 25px", display: "flex", justifyContent: "center", gap: 15 }}>
        <button style={{ padding: "10px 20px", background: "#ef4444", color: "#fff", border: "none", borderRadius: 6 }}>
          End Call
        </button>
      </div>
    </div>
  );
}

// Game View Component - Expanded
function GameView() {
  const [currentGame, setCurrentGame] = useState(null);
  
  // Quiz Game (same as before)
  // Memory Game (same as before)
  
  // NEW: Typing Game
  const TypingGame = ({ onBack }) => {
    const [words, setWords] = useState(["algorithm", "function", "variable", "debugging"]);
    const [currentWord, setCurrentWord] = useState("");
    const [input, setInput] = useState("");
    const [timeLeft, setTimeLeft] = useState(30);
    const [score, setScore] = useState(0);

    useEffect(() => {
      const timer = setInterval(() => {
        setTimeLeft(prev => {
          if (prev <= 0) {
            clearInterval(timer);
            return 0;
          }
          return prev - 1;
        });
      }, 1000);
      return () => clearInterval(timer);
    }, []);

    const handleType = () => {
      if (input === currentWord) {
        setScore(s => s + 1);
        setInput("");
        setCurrentWord(words[Math.floor(Math.random() * words.length)]);
      }
    };

    return (
      <div style={{ padding: 30 }}>
        <button onClick={onBack} style={{ marginBottom: 20 }}>← Back</button>
        <div style={{ textAlign: "center" }}>
          <h2 style={{ color: "#00dcff" }}>Speed Typing</h2>
          <p>Time Left: {timeLeft}s | Score: {score}</p>
          <div style={{ fontSize: 24, margin: 20 }}>{currentWord}</div>
          <input 
            value={input} 
            onChange={(e) => setInput(e.target.value)}
            onKeyPress={(e) => e.key === 'Enter' && handleType()}
            style={{ padding: 10, width: 300 }}
            placeholder="Type the word..."
          />
        </div>
      </div>
    );
  };

  // NEW: Trivia Game
  const TriviaGame = ({ onBack }) => {
    const [questions] = useState([
      { q: "What does CSS stand for?", options: ["Creative Style Sheets", "Cascading Style Sheets", "Computer Style Sheets"], correct: 1 },
      { q: "Which language runs in a web browser?", options: ["Java", "C#", "JavaScript", "Python"], correct: 2 }
    ]);
    const [current, setCurrent] = useState(0);
    const [score, setScore] = useState(0);

    const handleAnswer = (idx) => {
      if (idx === questions[current].correct) setScore(s => s + 1);
      if (current < questions.length - 1) setCurrent(c => c + 1);
    };

    return (
      <div style={{ padding: 30 }}>
        <button onClick={onBack} style={{ marginBottom: 20 }}>← Back</button>
        {current < questions.length ? (
          <>
            <h2 style={{ color: "#00dcff" }}>Trivia Challenge</h2>
            <p>{questions[current].q}</p>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 20 }}>
              {questions[current].options.map((opt, idx) => (
                <button key={idx} onClick={() => handleAnswer(idx)} style={{ padding: 15 }}>
                  {opt}
                </button>
              ))}
            </div>
          </>
        ) : (
          <div>
            <h2>Quiz Complete!</h2>
            <p>Your score: {score}/{questions.length}</p>
            <button onClick={onBack}>Play Again</button>
          </div>
        )}
      </div>
    );
  };

  // Game Selection UI
  if (!currentGame) {
    return (
      <div style={{ height: "100%", display: "flex", flexDirection: "column" }}>
        <div className="glass" style={{ padding: "15px 25px", borderBottom: "1px solid rgba(255,255,255,0.1)" }}>
          <h3 style={{ fontSize: 15, color: "#00dcff" }}>🎮 Game Arena</h3>
        </div>
        <div style={{ flex: 1, display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 20, padding: 30 }}>
          {[
            { id: "quiz", icon: "🧠", name: "Study Quiz", desc: "Test your knowledge" },
            { id: "memory", icon: "🎯", name: "Memory Match", desc: "Train your memory" },
            { id: "typing", icon: "⌨️", name: "Speed Typing", desc: "Type fast & accurate" },
            { id: "trivia", icon: "🎓", name: "Trivia Challenge", desc: "Answer random trivia" }
          ].map(game => (
            <div key={game.id} onClick={() => setCurrentGame(game.id)} style={{ 
              padding: 30, background: "rgba(0,220,255,0.1)", border: "1px solid #00dcff", 
              borderRadius: 12, cursor: "pointer", textAlign: "center", transition: "0.3s" 
            }}>
              <div style={{ fontSize: 50 }}>{game.icon}</div>
              <h3 style={{ color: "#00dcff" }}>{game.name}</h3>
              <p style={{ color: "#888" }}>{game.desc}</p>
            </div>
          ))}
        </div>
      </div>
    );
  }
  
  return currentGame === "quiz" ? <QuizGame onBack={() => setCurrentGame(null)} /> :
         currentGame === "memory" ? <MemoryGame onBack={() => setCurrentGame(null)} /> :
         currentGame === "typing" ? <TypingGame onBack={() => setCurrentGame(null)} /> :
         <TriviaGame onBack={() => setCurrentGame(null)} />;
}

// Main rendering
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
