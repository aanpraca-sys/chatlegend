<!DOCTYPE html>
<html lang="en"> 
<head>
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>StudyZone Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;800&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet"> 
  <style>
    *{box-sizing:border-box;margin:0;padding:0;} 
    html,body,#root{height:100%;overflow:hidden;background:#05050a;color:#e2e8f0;font-family:'Nunito',sans-serif;} 
    ::-webkit-scrollbar{width:6px;} 
    ::-webkit-scrollbar-thumb{background:rgba(0,220,255,0.2);border-radius:10px;} 
    .glass{background:rgba(255,255,255,0.03);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.08);}
  </style> 
</head> 
<body> 
<div id="root"></div> 
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// Generate unique room codes
function generateRoomCode() {
  return Math.floor(Math.random() * 900000 + 100000).toString();
}

// Nova AI Agent - Enhanced Response System
const novaResponses = {
  greetings: [
    "Hello! I'm Nova, your personal study assistant. How can I help you today?",
    "Welcome! What subject are you studying right now?",
    "Hi there! Let's make learning easier together.",
    "Greetings! Ask me anything about your coursework!"
  ],
  academic: {
    math: [
      "Let's break this math problem step by step. What concept are you struggling with?",
      "Math success starts with understanding the fundamentals. Which area needs clarification?",
      "I love solving math puzzles! What's the specific equation you're working on?",
      "Remember: practice makes perfect in math. Want to try some problems together?"
    ],
    science: [
      "Science is all about curiosity! What experiment or concept are you exploring?",
      "Let's explore this scientific principle together. Any specific questions?",
      "Lab work can be challenging - what part needs explanation?",
      "Science connects everything! What topic are you most interested in right now?"
    ],
    history: [
      "History helps us understand the present. Which era fascinates you most?",
      "Let's travel through time! What historical events are you studying?",
      "Understanding context is key in history. Need help with timelines?",
      "History comes alive through stories. What period would you like to explore?"
    ],
    english: [
      "Writing is a skill we can develop together. What aspect needs work?",
      "Literature analysis can be rewarding. Which text are you studying?",
      "Grammar questions? Let's clarify those rules together!",
      "Creative writing tips available! What are you working on?"
    ]
  },
  motivation: [
    "Learning is a journey - you're doing great!",
    "Every expert was once a beginner. Keep pushing forward!",
    "Small consistent efforts lead to big results. How can I support you?",
    "You're capable of amazing things. Let's tackle this challenge together!"
  ],
  default: [
    "Tell me more about that concept - I'm here to help!",
    "Interesting perspective! Let's explore this further together.",
    "I'm listening and ready to assist. What do you need clarified?",
    "Let's work through this step by step. What part is confusing?"
  ]
};

// Nova AI Response Engine
function getNovaResponse(userInput) {
  const input = userInput.toLowerCase();
  
  if (input.match(/hi|hello|hey|greetings|nova|assistant/)) {
    return novaResponses.greetings[Math.floor(Math.random() * novaResponses.greetings.length)];
  }
  
  for (const subject in novaResponses.academic) {
    if (input.includes(subject)) {
      return novaResponses.academic[subject][Math.floor(Math.random() * novaResponses.academic[subject].length)];
    }
  }
  
  if (input.match(/hard|struggle|difficult|confused|stuck|help/)) {
    return novaResponses.motivation[Math.floor(Math.random() * novaResponses.motivation.length)];
  }
  
  return novaResponses.default[Math.floor(Math.random() * novaResponses.default.length)];
}

// Join Screen Component
function JoinScreen({ onJoin }) {
  const [name, setName] = useState("anonymous");
  const [code, setCode] = useState("");
  const [mode, setMode] = useState("join");
  const [generatedCode, setGeneratedCode] = useState("");

  const handleJoin = () => {
    if (!name.trim()) {
      alert("Please enter your name!");
      return;
    }
    onJoin({ name, roomId: code.toUpperCase() });
  };

  const handleCreate = () => {
    if (!name.trim()) {
      alert("Please enter your name!");
      return;
    }
    const newCode = generateRoomCode();
    setGeneratedCode(newCode);
    onJoin({ name, roomId: newCode });
  };

  return (
    <div style={{ 
      display: "flex", 
      flexDirection: "column", 
      alignItems: "center", 
      justifyContent: "center", 
      height: "100vh", 
      background: "linear-gradient(135deg, #000518, #0a0a2a)",
      textAlign: "center"
    }}>
      <h1 style={{ color: "#00dcff", fontSize: 40, letterSpacing: 2, marginBottom: 10, fontWeight: 800 }}>StudyZone</h1>
      <p style={{ color: "#888", marginBottom: 30, fontSize: 14 }}>Advanced Study Collaboration</p>

      {/* Mode Toggle */}
      <div style={{ display: "flex", gap: 10, marginBottom: 30 }}>
        <button 
          onClick={() => { setMode("join"); setGeneratedCode(""); }} 
          style={{
            padding: "10px 20px",
            background: mode === "join" ? "#00dcff" : "rgba(255,255,255,0.05)",
            border: mode === "join" ? "none" : "1px solid rgba(255,255,255,0.1)",
            color: mode === "join" ? "#000" : "#00dcff",
            borderRadius: 6,
            cursor: "pointer",
            fontWeight: 700,
            fontSize: 12,
            textTransform: "uppercase"
          }}
        >
          Join Room
        </button>
        <button 
          onClick={() => { setMode("create"); }} 
          style={{
            padding: "10px 20px",
            background: mode === "create" ? "#00dcff" : "rgba(255,255,255,0.05)",
            border: mode === "create" ? "none" : "1px solid rgba(255,255,255,0.1)",
            color: mode === "create" ? "#000" : "#00dcff",
            borderRadius: 6,
            cursor: "pointer",
            fontWeight: 700,
            fontSize: 12,
            textTransform: "uppercase"
          }}
        >
          Create Room
        </button>
      </div>

      {/* Your Name */}
      <div style={{ marginBottom: 20, textAlign: "left", width: "100%", maxWidth: 400 }}>
        <label style={{ 
          fontSize: 11, 
          color: "#888", 
          letterSpacing: 1.5, 
          display: "block", 
          marginBottom: 8, 
          fontWeight: 700, 
          textTransform: "uppercase" 
        }}>
          Your Name
        </label>
        <input 
          value={name} 
          onChange={(e) => setName(e.target.value)} 
          placeholder="Enter your name" 
          style={{ 
            width: "100%", 
            padding: 12, 
            borderRadius: 8, 
            border: "1px solid #00dcff", 
            background: "#000", 
            color: "#fff", 
            fontSize: 14 
          }} 
        />
      </div>

      {/* Join Mode: Room Code Input */}
      {mode === "join" && (
        <div style={{ marginBottom: 20, textAlign: "left", width: "100%", maxWidth: 400 }}>
          <label style={{ 
            fontSize: 11, 
            color: "#888", 
            letterSpacing: 1.5, 
            display: "block", 
            marginBottom: 8, 
            fontWeight: 700, 
            textTransform: "uppercase" 
          }}>
            Room Code
          </label>
          <input 
            value={code} 
            onChange={(e) => setCode(e.target.value.toUpperCase())} 
            placeholder="Enter room code" 
            style={{ 
              width: "100%", 
              padding: 12, 
              borderRadius: 8, 
              border: "1px solid #00dcff", 
              background: "#000", 
              color: "#fff", 
              fontSize: 14,
              textTransform: "uppercase"
            }} 
          />
        </div>
      )}

      {/* Create Mode: Generated Code Display */}
      {mode === "create" && generatedCode && (
        <div style={{ marginBottom: 20, textAlign: "center", width: "100%", maxWidth: 400 }}>
          <div className="glass" style={{ padding: 15, borderRadius: 8 }}>
            <p style={{ color: "#888", marginBottom: 5 }}>Your Room Code:</p>
            <p style={{ color: "#00dcff", fontSize: 20, fontWeight: 800, letterSpacing: 2 }}>
              {generatedCode}
            </p>
            <p style={{ color: "#888", fontSize: 10, marginTop: 5 }}>
              Share this code with friends to invite them
            </p>
          </div>
        </div>
      )}

      {/* Action Button */}
      <button 
        onClick={mode === "join" ? handleJoin : handleCreate} 
        style={{ 
          padding: "12px 30px", 
          background: "#00dcff", 
          border: "none", 
          borderRadius: 8, 
          color: "#000", 
          fontWeight: 800, 
          cursor: "pointer",
          fontSize: 14,
          transition: "0.3s"
        }}
      >
        {mode === "join" ? "Join Study Room" : "Create Study Room"}
      </button>

      {/* Features */}
      <div style={{ 
        display: "grid", 
        gridTemplateColumns: "1fr 1fr 1fr", 
        gap: 10, 
        marginTop: 40,
        width: "100%",
        maxWidth: 800
      }}>
        {[
          { icon: "💬", label: "Live Chat" },
          { icon: "🤖", label: "AI Tutor" },
          { icon: "🎮", label: "Study Games" }
        ].map((feature, index) => (
          <div 
            key={index} 
            style={{ 
              padding: 15, 
              background: "rgba(0,220,255,0.1)", 
              border: "1px solid #00dcff", 
              borderRadius: 8, 
              textAlign: "center" 
            }}
          >
            <div style={{ fontSize: 24, marginBottom: 8 }}>{feature.icon}</div>
            <p style={{ color: "#00dcff", fontWeight: 600 }}>{feature.label}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

// Chat View Component - Fully Functional
function ChatView({ user, roomId }) {
  const [messages, setMessages] = useState([
    { id: Date.now(), text: `Welcome to StudyZone Pro, ${user.name}!`, user: "System", timestamp: new Date().toLocaleTimeString() }
  ]);
  const [input, setInput] = useState("");
  const messagesEndRef = useRef(null);

  // Auto-scroll to bottom of chat
  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages]);

  const handleSend = () => {
    if (!input.trim()) return;
    
    // Add user message
    const userMessage = {
      id: Date.now(),
      text: input,
      user: user.name,
      timestamp: new Date().toLocaleTimeString()
    };
    
    setMessages(prev => [...prev, userMessage]);
    setInput("");
  };

  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column" }}>
      {/* Header */}
      <div className="glass" style={{ padding: "15px 25px", borderBottom: "1px solid rgba(255,255,255,0.1)" }}>
        <h2 style={{ color: "#00dcff", fontSize: 20, fontWeight: 800, display: "flex", alignItems: "center", gap: 10 }}>
          <span>💬</span> Study Chat - {roomId}
        </h2>
        <p style={{ color: "#888", fontSize: 12, marginTop: 5 }}>Chatting with study partners</p>
      </div>
      
      {/* Messages Area */}
      <div style={{ flex: 1, overflowY: "auto", padding: 20 }}>
        {messages.map(message => (
          <div 
            key={message.id} 
            style={{ 
              marginBottom: 15,
              display: "flex",
              flexDirection: message.user === "System" ? "column" : "row",
              alignItems: message.user === "System" ? "center" : "flex-start",
              justifyContent: message.user === "System" ? "center" : "flex-start"
            }}
          >
            {message.user !== "System" && (
              <div style={{
                width: 40,
                height: 40,
                borderRadius: "50%",
                background: "rgba(0,220,255,0.2)",
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                marginRight: 10,
                fontWeight: 800
              }}>
                {message.user.charAt(0).toUpperCase()}
              </div>
            )}
            
            <div style={{
              background: message.user === "System" ? "rgba(0,220,255,0.2)" : "rgba(255,255,255,0.05)",
              borderLeft: message.user !== "System" ? "3px solid #00dcff" : "none",
              borderRadius: message.user === "System" ? "8px" : "8px 0px 8px 8px",
              padding: message.user === "System" ? "10px 20px" : "12px 15px",
              maxWidth: "70%",
              position: "relative"
            }}>
              {message.user !== "System" && (
                <div style={{ 
                  position: "absolute", 
                  top: -5, 
                  left: -10, 
                  background: "#00dcff", 
                  color: "#000", 
                  padding: "3px 8px", 
                  borderRadius: "10px",
                  fontSize: 12,
                  fontWeight: 700
                }}>
                  {message.user}
                </div>
              )}
              
              <p style={{ 
                color: message.user === "System" ? "#00dcff" : "#fff",
                fontSize: 14,
                lineHeight: 1.5
              }}>
                {message.text}
              </p>
              
              <div style={{ 
                display: "flex", 
                justifyContent: "space-between", 
                marginTop: 5, 
                fontSize: 10,
                color: "#888"
              }}>
                <span>{message.timestamp}</span>
                {message.user !== "System" && (
                  <button 
                    style={{ 
                      background: "none", 
                      border: "none", 
                      color: "#00dcff", 
                      cursor: "pointer",
                      padding: 0,
                      marginLeft: 10
                    }}
                    onClick={() => setInput(message.text)}
                  >
                    Reply
                  </button>
                )}
              </div>
            </div>
          </div>
        ))}
        <div ref={messagesEndRef} />
      </div>
      
      {/* Input Area */}
      <div className="glass" style={{ padding: "15px 25px", borderTop: "1px solid rgba(255,255,255,0.1)", display: "flex" }}>
        <input 
          type="text" 
          value={input} 
          onChange={(e) => setInput(e.target.value)} 
          onKeyPress={(e) => e.key === 'Enter' && handleSend()}
          placeholder="Type your message..." 
          style={{ 
            flex: 1, 
            padding: 12, 
            borderRadius: 8, 
            border: "1px solid rgba(0,220,255,0.3)", 
            background: "#000", 
            color: "#fff", 
            fontSize: 14 
          }} 
        />
        <button 
          onClick={handleSend} 
          style={{ 
            marginLeft: 10, 
            padding: "12px 20px", 
            background: "#00dcff", 
            border: "none", 
            borderRadius: 8, 
            color: "#000", 
            fontWeight: 800, 
            cursor: "pointer",
            transition: "0.3s"
          }}
        >
          SEND
        </button>
      </div>
    </div>
  );
}

// AI View Component - Nova AI Agent
function AIView({ user }) {
  const [messages, setMessages] = useState([
    { 
      id: Date.now(), 
      role: 'assistant', 
      text: `Hello ${user.name}! I'm Nova, your personal study assistant. How can I help you today? Ask me anything about your studies!` 
    }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const messagesEndRef = useRef(null);

  // Auto-scroll to bottom of chat
  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages]);

  const sendMessage = () => {
    if (!input.trim()) return;
    
    // Add user message
    const userMsg = {
      id: Date.now(),
      role: 'user',
      text: input
    };
    
    setMessages(prev => [...prev, userMsg]);
    setInput('');
    setLoading(true);
    
    // Simulate AI thinking delay
    setTimeout(() => {
      // Get AI response using built-in function
      const aiResponse = getNovaResponse(input);
      
      // Add AI response
      const assistantMsg = {
        id: Date.now() + 1,
        role: 'assistant',
        text: aiResponse
      };
      
      setMessages(prev => [...prev, assistantMsg]);
      setLoading(false);
    }, 800);
  };

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
      {/* Header */}
      <div className="glass" style={{ padding: "15px 25px", borderBottom: "1px solid rgba(255,255,255,0.1)" }}>
        <h2 style={{ color: "#00dcff", fontSize: 20, fontWeight: 800, display: "flex", alignItems: "center", gap: 10 }}>
          <span>🤖</span> Nova AI Tutor
        </h2>
        <p style={{ color: "#888", fontSize: 12, marginTop: 5 }}>Ask me anything about your studies!</p>
      </div>
      
      {/* Messages Area */}
      <div style={{ flex: 1, overflowY: 'auto', padding: 20 }}>
        {messages.map(message => (
          <div 
            key={message.id} 
            style={{ 
              marginBottom: 20,
              display: 'flex',
              flexDirection: message.role === 'assistant' ? 'row' : 'row-reverse',
              alignItems: 'flex-start'
            }}
          >
            <div style={{
              width: 40,
              height: 40,
              borderRadius: '50%',
              background: message.role === 'assistant' ? 'rgba(0,220,255,0.2)' : 'rgba(255,255,255,0.05)',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              margin: '0 10px'
            }}>
              {message.role === 'assistant' ? '🤖' : '👤'}
            </div>
            
            <div style={{
              background: message.role === 'assistant' ? 'rgba(0,220,255,0.1)' : 'rgba(255,255,255,0.05)',
              borderRadius: message.role === 'assistant' ? '8px' : '8px 0px 8px 8px',
              padding: '12px 15px',
              maxWidth: '70%',
              position: 'relative'
            }}>
              <p style={{ 
                color: message.role === 'assistant' ? '#00dcff' : '#fff',
                fontSize: 14,
                lineHeight: 1.5
              }}>
                {message.text}
              </p>
            </div>
          </div>
        ))}
        <div ref={messagesEndRef} />
      </div>
      
      {/* Input Area */}
      <div className="glass" style={{ padding: "15px 25px", borderTop: "1px solid rgba(255,255,255,0.1)", display: "flex" }}>
        <input 
          type="text" 
          value={input} 
          onChange={(e) => setInput(e.target.value)} 
          onKeyPress={(e) => e.key === 'Enter' && sendMessage()}
          placeholder="Ask Nova anything about your studies..." 
          style={{ 
            flex: 1, 
            padding: 12, 
            borderRadius: 8, 
            border: "1px solid rgba(0,220,255,0.3)", 
            background: "#000", 
            color: "#fff", 
            fontSize: 14 
          }} 
        />
        <button 
          onClick={sendMessage} 
          disabled={loading || !input.trim()} 
          style={{ 
            marginLeft: 10, 
            padding: "12px 20px", 
            background: "#00dcff", 
            border: "none", 
            borderRadius: 8, 
            color: "#000", 
            fontWeight: 800, 
            cursor: loading ? 'not-allowed' : 'pointer',
            opacity: loading ? 0.5 : 1
          }} 
        >
          {loading ? 'Thinking...' : 'SEND'}
        </button>
      </div>
    </div>
  );
}

// Game View Component - Fully Functional Quiz & Memory Games
function GameView() {
  const [currentGame, setCurrentGame] = useState(null);
  
  // Quiz Game Data
  const quizData = {
    questions: [
      { q: "What is the capital of France?", options: ["London", "Paris", "Berlin", "Madrid"], correct: 1 },
      { q: "What is 2 + 2?", options: ["3", "4", "5", "6"], correct: 1 },
      { q: "What is the largest planet?", options: ["Earth", "Mars", "Jupiter", "Saturn"], correct: 2 },
      { q: "Who wrote Romeo and Juliet?", options: ["Marlowe", "Shakespeare", "Bacon", "Donne"], correct: 1 },
      { q: "What is the chemical symbol for Gold?", options: ["Go", "Gd", "Au", "Ag"], correct: 2 },
      { q: "How many sides does a triangle have?", options: ["3", "4", "5", "6"], correct: 0 },
      { q: "What is the powerhouse of the cell?", options: ["Nucleus", "Mitochondria", "Ribosome", "Endoplasmic reticulum"], correct: 1 }
    ]
  };

  // Memory Game Data
  const memoryGameData = {
    cards: [
      { id: 1, value: "🐱", matched: false },
      { id: 2, value: "🐶", matched: false },
      { id: 3, value: "🐹", matched: false },
      { id: 4, value: "🐰", matched: false },
      { id: 5, value: "🐱", matched: false },
      { id: 6, value: "🐶", matched: false },
      { id: 7, value: "🐹", matched: false },
      { id: 8, value: "🐰", matched: false }
    ]
  };

  // Quiz Game Component
  const QuizGame = ({ onBack }) => {
    const [score, setScore] = useState(0);
    const [current, setCurrent] = useState(0);
    const [answered, setAnswered] = useState(false);

    const handleAnswer = (idx) => {
      if (!answered) {
        if (idx === quizData.questions[current].correct) {
          setScore(s => s + 1);
        }
        setAnswered(true);
      }
    };

    const nextQuestion = () => {
      if (current < quizData.questions.length - 1) {
        setCurrent(c => c + 1);
        setAnswered(false);
      }
    };

    if (current >= quizData.questions.length) {
      return (
        <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:20 }}>
          <div style={{ fontSize: 60 }}>🏆</div>
          <h2 style={{ color:"#00dcff", fontSize: 32 }}>Quiz Complete!</h2>
          <p style={{ fontSize: 24, color:"#a78bfa" }}>Score: {score}/{quizData.questions.length}</p>
          <button onClick={onBack} style={{ padding:"12px 25px", background:"#00dcff", color:"#000", border:"none", borderRadius:8, fontWeight:800, cursor:"pointer" }}>Play Again</button>
        </div>
      );
    }

    return (
      <div style={{ flex:1, display:"flex", flexDirection:"column", padding:30 }}>
        <div style={{ marginBottom: 20 }}> 
          <button onClick={onBack} style={{ padding:"8px 15px", background:"rgba(0,220,255,0.2)", border:"1px solid #00dcff", color:"#00dcff", borderRadius:6, fontWeight:800, cursor:"pointer" }}>← Back</button> 
        </div>
        <div style={{ textAlign:"center", marginBottom:30 }}> 
          <p style={{ color:"#888", marginBottom:10 }}>Question {current + 1}/{quizData.questions.length}</p> 
          <h2 style={{ color:"#00dcff", fontSize:24 }}>{quizData.questions[current].q}</h2> 
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:15, marginBottom:30 }}> 
          {quizData.questions[current].options.map((opt, idx) => ( 
            <button key={idx} onClick={() => handleAnswer(idx)} disabled={answered} style={{ padding:20, background: answered ? (idx === quizData.questions[current].correct ? "#22c55e" : idx === current ? "#ef4444" : "rgba(255,255,255,0.05)") : "rgba(255,255,255,0.05)", border: answered ? (idx === quizData.questions[current].correct ? "2px solid #22c55e" : "1px solid rgba(255,255,255,0.1)") : "1px solid rgba(255,255,255,0.1)", color:"#fff", borderRadius:8, cursor: answered ? "not-allowed" : "pointer", fontWeight:700, opacity: answered ? 1 : 0.7 }} > {opt} </button> 
          ))} 
        </div> 
        {answered && ( 
          <button onClick={nextQuestion} style={{ padding:"12px 25px", background:"#00dcff", color:"#000", border:"none", borderRadius:8, fontWeight:800, cursor:"pointer" }} > {current < quizData.questions.length - 1 ? "Next Question" : "See Results"} </button> 
        )} 
        <div style={{ marginTop:20, textAlign:"center", color:"#888" }}> Current Score: <span style={{ color:"#a78bfa", fontWeight:800 }}>{score}</span> </div> 
      </div> 
    );
  };

  // Memory Game Component
  const MemoryGame = ({ onBack }) => {
    const [cards, setCards] = useState([...memoryGameData.cards].sort(() => Math.random() - 0.5));
    const [flipped, setFlipped] = useState([]);
    const [matchedPairs, setMatchedPairs] = useState(0);
    
    const handleCardClick = (id) => {
      if (flipped.includes(id) || cards.find(c => c.id === id).matched) return;
      
      setFlipped(prev => [...prev, id]);
      
      if (flipped.length === 1) {
        const firstCard = cards.find(c => c.id === flipped[0]);
        const secondCard = cards.find(c => c.id === id);
        
        if (firstCard.value === secondCard.value) {
          setCards(prev => prev.map(c => 
            c.id === firstCard.id || c.id === secondCard.id ? {...c, matched: true} : c
          ));
          setMatchedPairs(prev => prev + 1);
          setFlipped([]);
        } else {
          setTimeout(() => {
            setFlipped([]);
          }, 1000);
        }
      }
    };
    
    return (
      <div style={{ flex:1, display:"flex", flexDirection:"column", padding:30 }}>
        <div style={{ marginBottom: 20 }}> 
          <button onClick={onBack} style={{ padding:"8px 15px", background:"rgba(0,220,255,0.2)", border:"1px solid #00dcff", color:"#00dcff", borderRadius:6, fontWeight:800, cursor:"pointer" }}>← Back</button> 
        </div>
        
        <div style={{ textAlign: "center", marginBottom: 20 }}>
          <h2 style={{ color:"#00dcff", fontSize:24 }}>Memory Match</h2>
          <p style={{ color:"#888" }}>Match pairs of animals</p>
        </div>
        
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 15, marginBottom: 30 }}>
          {cards.map(card => (
            <button 
              key={card.id}
              onClick={() => handleCardClick(card.id)}
              style={{
                width: 80,
                height: 80,
                borderRadius: 8,
                background: flipped.includes(card.id) || card.matched ? 
                  "rgba(0,220,255,0.2)" : "#000",
                border: "2px solid #00dcff",
                color: "#fff",
                fontSize: 24,
                cursor: "pointer",
                display: "flex",
                alignItems: "center",
                justifyContent: "center"
              }}
              disabled={flipped.includes(card.id) || card.matched}
            >
              {flipped.includes(card.id) || card.matched ? card.value : "?"}
            </button>
          ))}
        </div>
        
        <div style={{ textAlign: "center" }}>
          <p style={{ color:"#888" }}>Pairs Matched: <span style={{ color:"#a78bfa", fontWeight:800 }}>{matchedPairs}</span>/<span style={{ color:"#a78bfa", fontWeight:800 }}>4</span></p>
          {matchedPairs === 4 && (
            <button 
              onClick={onBack}
              style={{ 
                padding:"12px 25px", 
                background:"#00dcff", 
                color:"#000", 
                border:"none", 
                borderRadius:8, 
                fontWeight:800, 
                cursor:"pointer",
                marginTop: 10
              }} 
            >
              Play Again
            </button>
          )}
        </div>
      </div>
    );
  };

  if (!currentGame) {
    return (
      <div style={{ height:"100%", display:"flex", flexDirection:"column" }}>
        <div className="glass" style={{ padding:"15px 25px", borderBottom:"1px solid rgba(255,255,255,0.1)" }}>
          <h3 style={{ fontSize:15, color:"#00dcff", fontWeight:800 }}>🎮 Game Arena</h3>
        </div>
        <div style={{ flex:1, display:"grid", gridTemplateColumns:"repeat(2, 1fr)", gap:20, padding:30 }}>
          {[
            { id: "quiz", icon: "🧠", name: "Study Quiz", desc: "Test your knowledge" },
            { id: "memory", icon: "🎯", name: "Memory Match", desc: "Train your memory" }
          ].map(game => (
            <div 
              key={game.id} 
              onClick={() => setCurrentGame(game.id)} 
              style={{ 
                padding:30, 
                background:"rgba(0,220,255,0.1)", 
                border:"1px solid #00dcff", 
                borderRadius:12, 
                cursor:"pointer", 
                textAlign:"center", 
                transition:"0.3s" 
              }} 
              onMouseEnter={e => e.currentTarget.style.background = "rgba(0,220,255,0.2)"}
              onMouseLeave={e => e.currentTarget.style.background = "rgba(0,220,255,0.1)"}
            >
              <div style={{ fontSize:50, marginBottom:10 }}>{game.icon}</div>
              <h3 style={{ color:"#00dcff", marginBottom:5 }}>{game.name}</h3>
              <p style={{ color:"#888", fontSize:12 }}>{game.desc}</p>
            </div>
          ))}
        </div>
      </div>
    );
  }
  
  return currentGame === "quiz" ? <QuizGame onBack={() => setCurrentGame(null)} /> : <MemoryGame onBack={() => setCurrentGame(null)} />;
}

// Main rendering
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
