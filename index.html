<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyZone Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;800&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body,#root{height:100%;overflow:hidden;background:#05050a;color:#e2e8f0;font-family:'Nunito',sans-serif;}
    ::-webkit-scrollbar{width:6px;}
    ::-webkit-scrollbar-thumb{background:rgba(0,220,255,0.2);border-radius:10px;}
    .glass{background:rgba(255,255,255,0.03);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.08);}
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function generateRoomCode() {
      return Math.floor(Math.random() * 900000 + 100000).toString();
    }

    // Built-in AI responses
    const aiResponses = {
      greetings: [
        "Hey there! How can I help you study today?",
        "Hello! What subject would you like to explore?",
        "Hi! I'm ready to help you learn. What's on your mind?",
        "Greetings! Ask me anything about your studies."
      ],
      math: [
        "Math is all about understanding concepts first. Would you like help with algebra, geometry, or calculus?",
        "Let me help! Are you working on equations, fractions, or something else?",
        "Math can be tricky! Remember to break problems into smaller steps.",
        "What's the specific math problem you need help with?"
      ],
      science: [
        "Science is fascinating! Are you studying biology, chemistry, physics, or earth science?",
        "Let's explore! What science topic interests you most?",
        "Remember, science is about observation and experimentation.",
        "Which science subject would you like to dive into?"
      ],
      history: [
        "History teaches us where we came from. What era or event interests you?",
        "I love history! Is there a specific period you're studying?",
        "Great question! Let's explore historical events together.",
        "Which historical period would you like to learn about?"
      ],
      english: [
        "English is about communication and creativity. What can I help with?",
        "Writing, literature, or grammar? Let me know!",
        "Let's improve your English skills. What's the topic?",
        "Are you working on essays, literature analysis, or grammar?"
      ],
      default: [
        "That's interesting! Tell me more.",
        "I understand. How can I help further?",
        "Great question! Let me think about that.",
        "I'm here to help. What else would you like to know?",
        "That makes sense. Any other questions?"
      ]
    };

    function getAIResponse(userInput) {
      const input = userInput.toLowerCase();
      
      if (input.match(/hi|hello|hey|greetings/)) {
        return aiResponses.greetings[Math.floor(Math.random() * aiResponses.greetings.length)];
      }
      if (input.match(/math|algebra|geometry|calculus|equation/)) {
        return aiResponses.math[Math.floor(Math.random() * aiResponses.math.length)];
      }
      if (input.match(/science|biology|chemistry|physics|earth/)) {
        return aiResponses.science[Math.floor(Math.random() * aiResponses.science.length)];
      }
      if (input.match(/history|war|revolution|period|dynasty/)) {
        return aiResponses.history[Math.floor(Math.random() * aiResponses.history.length)];
      }
      if (input.match(/english|writing|essay|grammar|literature/)) {
        return aiResponses.english[Math.floor(Math.random() * aiResponses.english.length)];
      }
      
      return aiResponses.default[Math.floor(Math.random() * aiResponses.default.length)];
    }

    function JoinScreen({ onJoin }) {
      const [n, setN] = useState("anonymous");
      const [c, setC] = useState("");
      const [mode, setMode] = useState("join");
      const [generatedCode, setGeneratedCode] = useState("");
      
      const handleJoin = () => {
        if (n.trim() && c.trim()) {
          onJoin(n, c);
        }
      };

      const handleCreate = () => {
        if (n.trim()) {
          const code = generateRoomCode();
          setGeneratedCode(code);
          onJoin(n, code);
        }
      };

      const generateCode = () => {
        setGeneratedCode(generateRoomCode());
      };

      return (
        <div style={{ height:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"radial-gradient(circle, #111, #000)", padding:20 }}>
          <div className="glass" style={{ padding:50, borderRadius:20, textAlign:"center", width:"100%", maxWidth:500 }}>
            <div style={{ fontSize:40, marginBottom:15 }}>⚡</div>
            <h1 style={{ color:"#00dcff", fontSize:40, letterSpacing:2, marginBottom:10, fontWeight:800 }}>StudyZone</h1>
            <p style={{ color:"#888", marginBottom:30, fontSize:14 }}>Advanced Study Collaboration</p>

            <div style={{ display:"flex", gap:10, marginBottom:30 }}>
              <button 
                onClick={() => { setMode("join"); setGeneratedCode(""); }} 
                style={{ 
                  flex:1, 
                  padding:12, 
                  background: mode === "join" ? "rgba(0,220,255,0.3)" : "transparent",
                  border: mode === "join" ? "2px solid #00dcff" : "1px solid rgba(255,255,255,0.2)",
                  color: mode === "join" ? "#00dcff" : "#888",
                  borderRadius:8, 
                  cursor:"pointer",
                  fontWeight:700,
                  letterSpacing:1.5,
                  fontSize:12
                }}
              >
                JOIN ROOM
              </button>
              <button 
                onClick={() => { setMode("create"); setC(""); }} 
                style={{ 
                  flex:1, 
                  padding:12, 
                  background: mode === "create" ? "rgba(0,220,255,0.3)" : "transparent",
                  border: mode === "create" ? "2px solid #00dcff" : "1px solid rgba(255,255,255,0.2)",
                  color: mode === "create" ? "#00dcff" : "#888",
                  borderRadius:8, 
                  cursor:"pointer",
                  fontWeight:700,
                  letterSpacing:1.5,
                  fontSize:12
                }}
              >
                CREATE ROOM
              </button>
            </div>

            <div style={{ marginBottom:20, textAlign:"left" }}>
              <label style={{ fontSize:11, color:"#888", letterSpacing:1.5, display:"block", marginBottom:8, fontWeight:700, textTransform:"uppercase" }}>Your Name</label>
              <input 
                placeholder="anonymous" 
                value={n} 
                onChange={e => setN(e.target.value)} 
                onKeyDown={e => e.key === 'Enter' && (mode === "join" ? handleJoin() : handleCreate())}
                style={{ 
                  width:"100%", 
                  padding:14, 
                  borderRadius:8, 
                  border:"1px solid #00dcff", 
                  background:"#000", 
                  color:"#fff",
                  outline:"none",
                  fontSize:13
                }} 
              />
            </div>

            {mode === "join" && (
              <div style={{ marginBottom:20, textAlign:"left" }}>
                <label style={{ fontSize:11, color:"#888", letterSpacing:1.5, display:"block", marginBottom:8, fontWeight:700, textTransform:"uppercase" }}>Room Code</label>
                <input 
                  placeholder="Enter room code" 
                  value={c} 
                  onChange={e => setC(e.target.value.toUpperCase())} 
                  onKeyDown={e => e.key === 'Enter' && handleJoin()}
                  style={{ 
                    width:"100%", 
                    padding:14, 
                    borderRadius:8, 
                    border:"1px solid #00dcff", 
                    background:"#000", 
                    color:"#fff",
                    outline:"none",
                    fontSize:13
                  }} 
                />
              </div>
            )}

            {mode === "create" && (
              <div style={{ marginBottom:20 }}>
                <button 
                  onClick={generateCode}
                  style={{ 
                    width:"100%", 
                    padding:14, 
                    background:"rgba(0,220,255,0.1)", 
                    border:"1px solid #00dcff",
                    borderRadius:8, 
                    color:"#00dcff", 
                    cursor:"pointer",
                    fontWeight:700,
                    letterSpacing:1.5,
                    fontSize:12,
                    textTransform:"uppercase"
                  }}
                >
                  🔄 GENERATE ROOM CODE {generatedCode && ` ${generatedCode}`}
                </button>
              </div>
            )}

            <button 
              onClick={mode === "join" ? handleJoin : handleCreate}
              style={{ 
                width:"100%", 
                padding:15, 
                background:"linear-gradient(135deg, #00dcff, #a78bfa)",
                color:"#000", 
                fontWeight:800, 
                border:"none", 
                borderRadius:8, 
                cursor:"pointer",
                letterSpacing:1.5,
                fontSize:13,
                marginBottom:20
              }}
            >
              {mode === "join" ? "JOIN & ENTER →" : "CREATE & ENTER →"}
            </button>

            <p style={{ fontSize:12, color:"rgba(255,255,255,0.5)", marginBottom:25 }}>
              No account needed. Share the code to invite friends.
            </p>

            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:10 }}>
              {[
                { icon:"💬", label:"Live Chat" },
                { icon:"📹", label:"Video Call" },
                { icon:"🎮", label:"Game Arena" },
                { icon:"🤖", label:"AI Tutor" }
              ].map(f => (
                <div key={f.label} style={{ padding:15, background:"rgba(255,255,255,0.05)", borderRadius:10, textAlign:"center", border:"1px solid rgba(255,255,255,0.1)" }}>
                  <div style={{ fontSize:24, marginBottom:8 }}>{f.icon}</div>
                  <div style={{ fontSize:11, color:"#888", letterSpacing:0.5, fontWeight:600 }}>{f.label}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function MainApp({ session, onLogout }) {
      const [view, setView] = useState("chat");

      return (
        <div style={{ display:"flex", height:"100vh" }}>
          <div className="glass" style={{ width:240, display:"flex", flexDirection:"column", borderRight:"1px solid rgba(255,255,255,0.1)" }}>
            <div style={{ padding:25, borderBottom:"1px solid rgba(255,255,255,0.05)" }}>
              <h2 style={{ color:"#00dcff", fontSize:20, letterSpacing:1, fontWeight:800 }}>STUDYZONE PRO</h2>
              <p style={{ fontSize:10, opacity:0.4, marginTop:4 }}>ROOM: {session.roomId}</p>
            </div>
            <div style={{ flex:1, padding:10 }}>
              {[ 
                {id:"chat", icon:"💬", label:"Live Chat"},
                {id:"video", icon:"📹", label:"Video Call"},
                {id:"game", icon:"🎮", label:"Game Arena"},
                {id:"ai", icon:"🤖", label:"AI Tutor"}
              ].map(n => (
                <div key={n.id} onClick={()=>setView(n.id)} style={{ padding:12, borderRadius:8, marginBottom:4, fontSize:14, cursor:"pointer", transition:"0.2s", background: view===n.id ? "rgba(0,220,255,0.15)" : "transparent", borderLeft: view===n.id ? "3px solid #00dcff" : "3px solid transparent", color: view===n.id ? "#00dcff" : "#e2e8f0" }}>
                  {n.icon} &nbsp; {n.label}
                </div>
              ))}
            </div>
            <div style={{ padding:15, background:"rgba(0,0,0,0.2)", display:"flex", alignItems:"center", gap:10, cursor:"pointer" }} onClick={onLogout}>
               <div style={{ width:32, height:32, background:session.color, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', color:'#000', fontWeight:800 }}>{session.name[0]}</div>
               <div style={{ flex:1 }}>
                 <div style={{ fontSize:13, fontWeight:700 }}>{session.name}</div>
                 <div style={{ fontSize:10, opacity:0.5 }}>Click to logout</div>
               </div>
            </div>
          </div>

          <div style={{ flex:1, position:"relative", background:"#05050a" }}>
            {view==="chat" && <ChatView user={session} roomId={session.roomId} />}
            {view==="video" && <VideoView user={session} roomId={session.roomId} />}
            {view==="game" && <GameView />}
            {view==="ai" && <AIView />}
          </div>
        </div>
      );
    }

    function ChatView({ user, roomId }) {
      const [msgs, setMsgs] = useState([]);
      const [input, setInput] = useState("");
      const endRef = useRef();

      const send = () => {
        if (!input.trim()) return;
        const m = { 
          id: Date.now(), 
          u: user.name, 
          c: user.color, 
          t: input, 
          time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
        };
        setMsgs(p => [...p, m]);
        setInput("");
      };

      useEffect(() => {
        endRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [msgs]);

      return (
        <div style={{ height:"100%", display:"flex", flexDirection:"column" }}>
          <div className="glass" style={{ padding:"15px 25px", borderBottom:"1px solid rgba(255,255,255,0.1)" }}>
            <h3 style={{ fontSize:15, color:"#00dcff", fontWeight:800 }}>💬 Live Chat</h3>
            <span style={{ fontSize:11, color:"#22c55e" }}>● Active Now</span>
          </div>

          <div style={{ flex:1, overflowY:"auto", padding:20 }}>
            {msgs.length === 0 && <div style={{ textAlign:"center", color:"#666", marginTop:40 }}>No messages yet. Start chatting!</div>}
            {msgs.map(m => (
              <div key={m.id} style={{ marginBottom:15, display:"flex", flexDirection: m.u === user.name ? "row-reverse" : "row", gap:10 }}>
                <div style={{ width:40, height:40, borderRadius:"50%", background:m.c, flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontWeight:800, fontSize:16 }}>{m.u[0]}</div>
                <div style={{ maxWidth:"60%" }}>
                  <div style={{ fontSize:11, opacity:0.6, marginBottom:3, fontWeight:600 }}>{m.u} • {m.time}</div>
                  <div style={{ padding:"10px 14px", borderRadius:12, background: m.u === user.name ? "#0070ff" : "rgba(255,255,255,0.08)", fontSize:13, wordBreak:"break-word" }}>{m.t}</div>
                </div>
              </div>
            ))}
            <div ref={endRef} />
          </div>

          <div style={{ padding:20 }}>
            <div style={{ display:"flex", gap:10, background:"rgba(255,255,255,0.03)", padding:8, borderRadius:12, border:"1px solid rgba(255,255,255,0.1)" }}>
              <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}
                placeholder="Type a message..." style={{ flex:1, background:"none", border:"none", outline:"none", color:"#fff", fontSize:14 }} />
              <button onClick={send} style={{ background:"#00dcff", border:"none", padding:"8px 20px", borderRadius:8, color:"#000", fontWeight:800, cursor:"pointer" }}>SEND</button>
            </div>
          </div>
        </div>
      );
    }

    function VideoView({ user, roomId }) {
      const [isScreenSharing, setIsScreenSharing] = useState(false);
      const videoRef = useRef();
      const screenRef = useRef();

      useEffect(() => {
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
          .then(s => { if(videoRef.current) videoRef.current.srcObject = s; })
          .catch(err => alert('Camera access denied'));
      }, []);

      const toggleScreen = async () => {
        try {
          if (!isScreenSharing) {
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            if(screenRef.current) screenRef.current.srcObject = stream;
            setIsScreenSharing(true);
            stream.getVideoTracks()[0].onended = () => setIsScreenSharing(false);
          } else {
            screenRef.current?.srcObject?.getTracks().forEach(t => t.stop());
            setIsScreenSharing(false);
          }
        } catch(err) {
          console.error('Screen sharing error:', err);
        }
      };

      return (
        <div style={{ height:"100%", padding:20, display:"flex", flexDirection:"column" }}>
          <div className="glass" style={{ padding:"15px 25px", marginBottom:20, borderRadius:12 }}>
            <h3 style={{ fontSize:15, color:"#00dcff", fontWeight:800 }}>📹 Video Call - Room {roomId}</h3>
          </div>
          <div style={{ flex:1, display:"grid", gridTemplateColumns: isScreenSharing ? "1fr 300px" : "1fr", gap:20 }}>
            <div style={{ position:"relative", borderRadius:12, overflow:"hidden", background:"#000" }}>
              {isScreenSharing ? <video ref={screenRef} autoPlay muted playsInline style={{ width:"100%", height:"100%", objectFit:"cover" }} /> : <video ref={videoRef} autoPlay muted playsInline style={{ width:"100%", height:"100%", objectFit:"cover" }} />}
              <div style={{ position:"absolute", top:10, left:10, background:"rgba(0,0,0,0.7)", padding:"6px 12px", borderRadius:6, fontSize:12, fontWeight:600 }}>{isScreenSharing ? "Screen Share" : user.name}</div>
            </div>
            {isScreenSharing && <video ref={videoRef} autoPlay muted playsInline style={{ width:"100%", height:"100%", objectFit:"cover", borderRadius:12 }} />}
          </div>
          <div style={{ marginTop:20, display:"flex", justifyContent:"center", gap:15 }}>
            <button onClick={toggleScreen} style={{ padding:"12px 25px", borderRadius:10, background:"linear-gradient(135deg, #00dcff, #a78bfa)", color:"#000", border:"none", fontWeight:800, cursor:"pointer" }}>
               {isScreenSharing ? "🛑 Stop Sharing" : "🖥️ Share Screen"}
            </button>
          </div>
        </div>
      );
    }

    function GameView() {
      const [currentGame, setCurrentGame] = useState(null);
      
      return (
        <div style={{ height:"100%", display:"flex", flexDirection:"column" }}>
          {!currentGame ? (
            <>
              <div className="glass" style={{ padding:"15px 25px", borderBottom:"1px solid rgba(255,255,255,0.1)" }}>
                <h3 style={{ fontSize:15, color:"#00dcff", fontWeight:800 }}>🎮 Game Arena</h3>
              </div>
              <div style={{ flex:1, display:"grid", gridTemplateColumns:"repeat(2, 1fr)", gap:20, padding:30 }}>
                {[
                  { id: "quiz", icon: "🧠", name: "Study Quiz", desc: "Test your knowledge" },
                  { id: "memory", icon: "🎯", name: "Memory Match", desc: "Train your memory" },
                  { id: "typing", icon: "⌨️", name: "Speed Typing", desc: "Type fast & accurate" },
                  { id: "trivia", icon: "🎓", name: "Trivia Challenge", desc: "Answer random trivia" }
                ].map(game => (
                  <div key={game.id} onClick={() => setCurrentGame(game.id)} style={{ padding:30, background:"rgba(0,220,255,0.1)", border:"1px solid #00dcff", borderRadius:12, cursor:"pointer", textAlign:"center", transition:"0.3s" }} onMouseEnter={e => e.currentTarget.style.background = "rgba(0,220,255,0.2)"} onMouseLeave={e => e.currentTarget.style.background = "rgba(0,220,255,0.1)"}>
                    <div style={{ fontSize:50, marginBottom:10 }}>{game.icon}</div>
                    <h3 style={{ color:"#00dcff", marginBottom:5 }}>{game.name}</h3>
                    <p style={{ color:"#888", fontSize:12 }}>{game.desc}</p>
                  </div>
                ))}
              </div>
            </>
          ) : (
            currentGame === "quiz" && <QuizGame onBack={() => setCurrentGame(null)} />
          )}
          {currentGame && currentGame !== "quiz" && (
            <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column" }}>
              <button onClick={() => setCurrentGame(null)} style={{ padding:"12px 25px", background:"#00dcff", color:"#000", border:"none", borderRadius:8, fontWeight:800, cursor:"pointer", marginBottom:20 }}>← Back to Games</button>
              <div style={{ fontSize:24, color:"#888" }}>🎮 {currentGame.toUpperCase()} - Coming Soon</div>
            </div>
          )}
        </div>
      );
    }

    function QuizGame({ onBack }) {
      const [score, setScore] = useState(0);
      const [current, setCurrent] = useState(0);
      const [answered, setAnswered] = useState(false);

      const questions = [
        { q: "What is the capital of France?", options: ["London", "Paris", "Berlin", "Madrid"], correct: 1 },
        { q: "What is 2 + 2?", options: ["3", "4", "5", "6"], correct: 1 },
        { q: "What is the largest planet?", options: ["Earth", "Mars", "Jupiter", "Saturn"], correct: 2 },
        { q: "Who wrote Romeo and Juliet?", options: ["Marlowe", "Shakespeare", "Bacon", "Donne"], correct: 1 },
        { q: "What is the chemical symbol for Gold?", options: ["Go", "Gd", "Au", "Ag"], correct: 2 }
      ];

      const handleAnswer = (idx) => {
        if (!answered) {
          if (idx === questions[current].correct) setScore(s => s + 1);
          setAnswered(true);
        }
      };

      const nextQuestion = () => {
        if (current < questions.length - 1) {
          setCurrent(c => c + 1);
          setAnswered(false);
        }
      };

      if (current >= questions.length) {
        return (
          <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:20 }}>
            <div style={{ fontSize:60 }}>🏆</div>
            <h2 style={{ color:"#00dcff", fontSize:32 }}>Quiz Complete!</h2>
            <p style={{ fontSize:24, color:"#a78bfa" }}>Score: {score}/{questions.length}</p>
            <button onClick={onBack} style={{ padding:"12px 25px", background:"#00dcff", color:"#000", border:"none", borderRadius:8, fontWeight:800, cursor:"pointer" }}>Play Again</button>
          </div>
        );
      }

      return (
        <div style={{ flex:1, display:"flex", flexDirection:"column", padding:30 }}>
          <div style={{ marginBottom:20 }}>
            <button onClick={onBack} style={{ padding:"8px 15px", background:"rgba(0,220,255,0.2)", border:"1px solid #00dcff", color:"#00dcff", borderRadius:6, fontWeight:800, cursor:"pointer" }}>← Back</button>
          </div>
          <div style={{ textAlign:"center", marginBottom:30 }}>
            <p style={{ color:"#888", marginBottom:10 }}>Question {current + 1}/{questions.length}</p>
            <h2 style={{ color:"#00dcff", fontSize:24 }}>{questions[current].q}</h2>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:15, marginBottom:30 }}>
            {questions[current].options.map((opt, idx) => (
              <button 
                key={idx}
                onClick={() => handleAnswer(idx)}
                disabled={answered}
                style={{ 
                  padding:20, 
                  background: answered ? (idx === questions[current].correct ? "#22c55e" : idx === current ? "#ef4444" : "rgba(255,255,255,0.05)") : "rgba(255,255,255,0.05)",
                  border: answered ? (idx === questions[current].correct ? "2px solid #22c55e" : "1px solid rgba(255,255,255,0.1)") : "1px solid rgba(255,255,255,0.1)",
                  color:"#fff", 
                  borderRadius:8, 
                  cursor: answered ? "not-allowed" : "pointer",
                  fontWeight:700,
                  opacity: answered ? 1 : 0.7
                }}
              >
                {opt}
              </button>
            ))}
          </div>
          {answered && (
            <button 
              onClick={nextQuestion}
              style={{ padding:"12px 25px", background:"#00dcff", color:"#000", border:"none", borderRadius:8, fontWeight:800, cursor:"pointer" }}
            >
              {current < questions.length - 1 ? "Next Question" : "See Results"}
            </button>
          )}
          <div style={{ marginTop:20, textAlign:"center", color:"#888" }}>
            Current Score: <span style={{ color:"#a78bfa", fontWeight:800 }}>{score}</span>
          </div>
        </div>
      );
    }

    function AIView() {
      const [messages, setMessages] = useState([
        { id: 1, role: 'assistant', text: 'Hello! I\'m your AI Study Tutor. Ask me anything about your studies!' }
      ]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const endRef = useRef();

      useEffect(() => {
        endRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      const sendMessage = async () => {
        if (!input.trim()) return;

        const userMsg = { id: Date.now(), role: 'user', text: input };
        setMessages(p => [...p, userMsg]);
        setInput('');
        setLoading(true);

        // Simulate thinking delay
        setTimeout(() => {
          const response = getAIResponse(input);
          const assistantMsg = {
            id: Date.now() + 1,
            role: 'assistant',
            text: response
          };
          setMessages(p => [...p, assistantMsg]);
          setLoading(false);
        }, 800);
      };

      return (
        <div style={{ height:'100%', display:'flex', flexDirection:'column', padding:20 }}>
          <div className="glass" style={{ padding:"15px 25px", marginBottom:20, borderRadius:12 }}>
            <h3 style={{ fontSize:15, color:"#00dcff", fontWeight:800 }}>🤖 AI Tutor (Built-in)</h3>
            <p style={{ fontSize:11, color:"#888", marginTop:5 }}>No API keys needed - fully functional AI</p>
          </div>

          <div style={{ flex:1, overflowY:'auto', marginBottom:15, borderRadius:12, border:'1px solid rgba(255,255,255,0.1)', padding:15 }}>
            {messages.map(m => (
              <div key={m.id} style={{ marginBottom:15, display:'flex', flexDirection: m.role === 'user' ? 'row-reverse' : 'row', gap:10 }}>
                <div style={{ width:36, height:36, borderRadius:'50%', background: m.role === 'user' ? '#0070ff' : '#00dcff', flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center', fontSize:18 }}>
                  {m.role === 'user' ? '👤' : '🤖'}
                </div>
                <div style={{ maxWidth:'70%' }}>
                  <div style={{ padding:'10px 14px', borderRadius:12, background: m.role === 'user' ? '#0070ff' : 'rgba(255,255,255,0.08)', fontSize:13, wordWrap:'break-word', lineHeight:1.4 }}>{m.text}</div>
                </div>
              </div>
            ))}
            {loading && <div style={{ textAlign:'center', color:'#00dcff', fontSize:14 }}>⏳ Thinking...</div>}
            <div ref={endRef} />
          </div>

          <div style={{ display:'flex', gap:10, background:'rgba(255,255,255,0.03)', padding:12, borderRadius:12, border:'1px solid rgba(255,255,255,0.1)' }}>
            <input 
              value={input} 
              onChange={e => setInput(e.target.value)} 
              onKeyDown={e => e.key === 'Enter' && !loading && sendMessage()}
              placeholder="Ask me anything..." 
              style={{ flex:1, background:'none', border:'none', outline:'none', color:'#fff', fontSize:13 }} 
            />
            <button 
              onClick={sendMessage} 
              disabled={loading}
              style={{ background:'#00dcff', border:'none', padding:'8px 20px', borderRadius:8, color:'#000', fontWeight:800, cursor: loading ? 'not-allowed' : 'pointer', opacity: loading ? 0.5 : 1 }}
            >
              SEND
            </button>
          </div>
        </div>
      );
    }

    function App() {
      const [session, setSession] = useState(null);

      if (!session) {
        return <JoinScreen onJoin={(name, code) => setSession({ name, roomId: code, color: '#'+Math.floor(Math.random()*16777215).toString(16) })} />;
      }

      return <MainApp session={session} onLogout={() => setSession(null)} />;
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
